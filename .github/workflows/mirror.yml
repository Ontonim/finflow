name: Mirror to Personal Repo

on:
  push:
    branches:
      - main 

permissions:
  contents: read

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout org repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure Git user
        run: |
          git config user.name "Arif Adnan"
          git config user.email "arifahamedadnan@gmail.com"

      - name: Push mirror to personal repo
        env:
          PAT: ${{ secrets.PERSONAL_REPO_TOKEN }}
        run: |
          # Remove remote if already exists (safe)
          git remote remove mirror || true

          # Add personal repo as mirror remote
          git remote add mirror https://x-access-token:${PAT}@@github.com/arifadnan05/Ontonim/finflow.git

          # Mirror push (branches + tags + deletes)
          git push --mirror mirror
